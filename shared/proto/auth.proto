syntax = "proto3";

package auth.v1;

option go_package = "github.com/yourorg/golang-modules/shared/proto/auth/v1;authv1";

// AuthService validates tokens and retrieves user info for internal gRPC calls.
service AuthService {
  rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenResponse);
  rpc GetUser(GetUserRequest) returns (GetUserResponse);
}

message ValidateTokenRequest {
  string token = 1;
}

message ValidateTokenResponse {
  bool   valid        = 1;
  string user_id      = 2;
  string tenant_id    = 3;
  repeated string roles = 4;
  bool   mfa_verified = 5;
}

message GetUserRequest {
  string user_id   = 1;
  string tenant_id = 2;
}

message GetUserResponse {
  string user_id        = 1;
  string tenant_id      = 2;
  bool   email_verified = 3;
  bool   mfa_enabled    = 4;
  repeated string roles = 5;
  bool   is_deleted     = 6;
}
