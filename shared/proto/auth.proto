syntax = "proto3";

package auth.v1;

option go_package = "github.com/yourorg/golang-modules/shared/proto/auth/v1;authv1";

// AuthService validates tokens and retrieves user info for internal gRPC calls.
service AuthService {
  rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenResponse);
  rpc GetUser(GetUserRequest) returns (GetUserResponse);
}

message ValidateTokenRequest {
  string token = 1;
}

message ValidateTokenResponse {
  string user_id   = 1;
  string tenant_id = 2;
  repeated string roles = 3;
  bool   valid     = 4;
}

message GetUserRequest {
  string user_id   = 1;
  string tenant_id = 2;
}

message GetUserResponse {
  string user_id    = 1;
  string tenant_id  = 2;
  string email      = 3;
  string first_name = 4;
  string last_name  = 5;
  bool   active     = 6;
}
