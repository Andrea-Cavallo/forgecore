syntax = "proto3";

package payment.v1;

option go_package = "github.com/Andrea-Cavallo/golang-modules/shared/proto/payment/v1;paymentv1";

// PaymentService exposes payment info for internal gRPC calls from forgecore-admin.
service PaymentService {
  rpc GetPayment(GetPaymentRequest) returns (GetPaymentResponse);
  rpc ListPaymentsByTenant(ListPaymentsByTenantRequest) returns (ListPaymentsByTenantResponse);
}

message GetPaymentRequest {
  string payment_id = 1;
  string tenant_id  = 2;
}

message GetPaymentResponse {
  string payment_id = 1;
  string tenant_id  = 2;
  string user_id    = 3;
  int64  amount     = 4;
  string currency   = 5;
  string status     = 6;
  string provider   = 7;
}

message ListPaymentsByTenantRequest {
  string tenant_id = 1;
  int32  limit     = 2;
  string cursor    = 3;
}

message ListPaymentsByTenantResponse {
  repeated GetPaymentResponse payments    = 1;
  string                      next_cursor = 2;
}
