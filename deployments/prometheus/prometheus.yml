global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: forgecore
    env: production

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - "rules.yml"

scrape_configs:
  - job_name: forgecore-auth
    static_configs:
      - targets: ["forgecore-auth:8081"]
    metrics_path: /metrics

  - job_name: forgecore-gateway
    static_configs:
      - targets: ["forgecore-gateway:8080"]
    metrics_path: /metrics

  - job_name: forgecore-payments
    static_configs:
      - targets: ["forgecore-payments:8082"]
    metrics_path: /metrics

  - job_name: forgecore-notifications
    static_configs:
      - targets: ["forgecore-notifications:8083"]
    metrics_path: /metrics

  - job_name: forgecore-admin
    static_configs:
      - targets: ["forgecore-admin:8084"]
    metrics_path: /metrics

  - job_name: forgecore-audit
    static_configs:
      - targets: ["forgecore-audit:8085"]
    metrics_path: /metrics

  - job_name: forgecore-permissions
    static_configs:
      - targets: ["forgecore-permissions:8087"]
    metrics_path: /metrics

  - job_name: forgecore-config
    static_configs:
      - targets: ["forgecore-config:8088"]
    metrics_path: /metrics

  - job_name: forgecore-webhooks
    static_configs:
      - targets: ["forgecore-webhooks:8089"]
    metrics_path: /metrics

  - job_name: forgecore-storage
    static_configs:
      - targets: ["forgecore-storage:8090"]
    metrics_path: /metrics

  - job_name: forgecore-subscriptions
    static_configs:
      - targets: ["forgecore-subscriptions:8091"]
    metrics_path: /metrics

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: nats
    static_configs:
      - targets: ["nats:8222"]
    metrics_path: /metrics
