name: Deploy

on:
  push:
    branches: [master, main]

jobs:
  push-images:
    name: Push Docker images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login a GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build e push immagini
        run: |
          for svc in services/*/; do
            name=$(basename "$svc")
            image="ghcr.io/andrea-cavallo/golang-modules/$name"
            docker build -t "$image:${{ github.sha }}" -t "$image:latest" "$svc"
            docker push "$image:${{ github.sha }}"
            docker push "$image:latest"
          done

  deploy:
    name: Deploy su VPS con rolling update
    runs-on: ubuntu-latest
    needs: push-images
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /app/golang-modules/deployments

            # Pull immagini aggiornate
            for svc in auth-service payment-service notification-service admin-service \
                        audit-service api-gateway permission-service config-service \
                        webhook-service storage-service subscription-service; do
              echo ">>> deploy $svc"
              docker compose pull "$svc"
              docker compose up -d --no-deps "$svc"

              # Health check: attende max 60 secondi
              port=$(docker compose port "$svc" 8080 2>/dev/null | cut -d: -f2 || echo "")
              if [ -n "$port" ]; then
                for i in $(seq 1 30); do
                  if curl -sf "http://localhost:$port/health/ready" > /dev/null 2>&1; then
                    echo "$svc healthy"
                    break
                  fi
                  sleep 2
                done
              fi
            done

            # Esegui migrazioni
            ./scripts/migrate.sh all up
