name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Static smoke
        shell: pwsh
        run: ./scripts/smoke-local.ps1
      - name: Gateway E2E
        shell: pwsh
        run: ./scripts/e2e-gateway.ps1
      - name: Build all modules
        shell: pwsh
        run: ./scripts/build-all.ps1
      - name: Security checks available locally
        shell: pwsh
        run: ./scripts/security-check.ps1
