name: security

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  go-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck on all modules
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r mod; do
            dir="$(dirname "$mod")"
            echo "govulncheck $dir"
            (cd "$dir" && govulncheck ./...)
          done < <(find . -name go.mod -not -path './graphify-out/*')
      - name: Gateway E2E security smoke
        shell: pwsh
        run: ./scripts/e2e-gateway.ps1

  container-scan:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - forgecore-gateway
          - forgecore-auth
          - forgecore-payments
          - forgecore-notifications
          - forgecore-admin
          - forgecore-audit
          - forgecore-jobs
          - forgecore-permissions
          - forgecore-config
          - forgecore-webhooks
          - forgecore-storage
          - forgecore-subscriptions
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -f services/${{ matrix.service }}/Dockerfile -t forgecore/${{ matrix.service }}:security .
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: forgecore/${{ matrix.service }}:security
          severity: CRITICAL,HIGH
          exit-code: "1"
